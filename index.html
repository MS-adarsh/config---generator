<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'VT323', monospace;
    color: #ff0000;
    padding: 20px;
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 520px;
  }

  .title {
    font-size: 48px;
    letter-spacing: 8px;
    color: #ff0000;
    text-shadow: 0 0 20px #b6000088;
    text-transform: uppercase;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 8px 16px;
    border: 1px solid #8f000033;
    background: #00ff880a;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #8d000066;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 28px;
    color: #ff0000;
    line-height: 1;
  }

  .canvas-container {
    position: relative;
    border: 2px solid #81000044;
    box-shadow: 0 0 30px #00ff8822, inset 0 0 30px #00000044;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0acc;
    gap: 12px;
  }

  .overlay-title {
    font-size: 52px;
    letter-spacing: 4px;
    color: #ff0000;
    text-shadow: 0 0 20px #ff0000;
  }

  .overlay-sub {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: #ce000088;
    letter-spacing: 1px;
  }

  .overlay-score {
    font-size: 32px;
    color: #008cff;
    margin: 4px 0;
  }

  .start-btn {
    margin-top: 8px;
    padding: 10px 32px;
    background: transparent;
    border: 1px solid #ff0000;
    color: #ff0000;
    font-family: 'VT323', monospace;
    font-size: 26px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .start-btn:hover {
    background: #00ff8822;
    box-shadow: 0 0 16px #a8000044;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(2, 44px);
    gap: 4px;
  }

  .ctrl-btn {
    width: 44px;
    height: 44px;
    background: #00ff880d;
    border: 1px solid #83000033;
    color: #ff0000;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    transition: background 0.1s;
    font-family: 'Space Mono', monospace;
  }

  .ctrl-btn:active { background: #00ff8833; }

  .ctrl-up    { grid-column: 2; grid-row: 1; }
  .ctrl-left  { grid-column: 1; grid-row: 2; }
  .ctrl-down  { grid-column: 2; grid-row: 2; }
  .ctrl-right { grid-column: 3; grid-row: 2; }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
  }

  .speed-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #ba000044;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="title">Xnake by XNDR</div>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Level</span>
      <span class="hud-value" id="level">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Best</span>
      <span class="hud-value" id="best">0</span>
    </div>
  </div>

  <div class="canvas-container" id="canvas-container">
    <canvas id="gameCanvas" width="480" height="480"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlay-title">SNAKE</div>
      <div class="overlay-sub" id="overlay-sub">Use arrow keys or buttons below</div>
      <div class="overlay-score" id="overlay-score" style="display:none"></div>
      <button class="start-btn" id="startBtn">[ START ]</button>
    </div>
  </div>

  <div class="footer-row">
    <div>
      <div class="speed-label">SPEED INCREASES WITH LEVEL</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn ctrl-up"    id="btn-up">↑</button>
      <button class="ctrl-btn ctrl-left"  id="btn-left">←</button>
      <button class="ctrl-btn ctrl-down"  id="btn-down">↓</button>
      <button class="ctrl-btn ctrl-right" id="btn-right">→</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, best, level, gameLoop, running, gameOver;

const scoreEl  = document.getElementById('score');
const levelEl  = document.getElementById('level');
const bestEl   = document.getElementById('best');
const overlay  = document.getElementById('overlay');
const oTitle   = document.getElementById('overlay-title');
const oSub     = document.getElementById('overlay-sub');
const oScore   = document.getElementById('overlay-score');
const startBtn = document.getElementById('startBtn');

best = 0;

function initGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  level = 1;
  running = true;
  gameOver = false;
  placeFood();
  updateHUD();
  overlay.style.display = 'none';
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
}

function getSpeed() {
  return Math.max(60, 180 - (level - 1) * 18);
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    score += level * 10;
    if (score > best) best = score;
    if (score % 50 === 0 && level < 10) {
      level++;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getSpeed());
    }
    placeFood();
    updateHUD();
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  clearInterval(gameLoop);
  running = false;
  gameOver = true;
  oTitle.textContent = 'GAME OVER';
  oSub.textContent = 'Press start to play again';
  oScore.style.display = 'block';
  oScore.textContent = 'Score: ' + score;
  startBtn.textContent = '[ RETRY ]';
  overlay.style.display = 'flex';
  bestEl.textContent = best;
}

function updateHUD() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  bestEl.textContent = best;
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = '#00ff8808';
  for (let x=0; x<COLS; x++) for (let y=0; y<ROWS; y++) {
    ctx.fillRect(x*GRID+9, y*GRID+9, 2, 2);
  }

  // Food
  const fx = food.x * GRID, fy = food.y * GRID;
  ctx.fillStyle = '#ff4466';
  ctx.shadowColor = '#ff4466';
  ctx.shadowBlur = 12;
  ctx.fillRect(fx+3, fy+3, GRID-6, GRID-6);
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const t = 1 - i / snake.length;
    const alpha = Math.round(55 + t * 200).toString(16).padStart(2,'0');
    ctx.fillStyle = '#00ff88' + alpha;
    if (i === 0) {
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 16;
    }
    ctx.fillRect(seg.x*GRID+1, seg.y*GRID+1, GRID-2, GRID-2);
    ctx.shadowBlur = 0;
  });
}

// Draw initial idle screen
ctx.fillStyle = '#0a0a0a';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = '#00ff8808';
for (let x=0;x<COLS;x++) for (let y=0;y<ROWS;y++) ctx.fillRect(x*GRID+9,y*GRID+9,2,2);

function setDir(nx, ny) {
  if (!running) return;
  if (nx !== 0 && dir.x !== 0) return;
  if (ny !== 0 && dir.y !== 0) return;
  nextDir = {x:nx, y:ny};
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
  if ((e.key===' '||e.key==='Enter') && !running) initGame();
});

document.getElementById('btn-up').addEventListener('click',    ()=>setDir(0,-1));
document.getElementById('btn-down').addEventListener('click',  ()=>setDir(0,1));
document.getElementById('btn-left').addEventListener('click',  ()=>setDir(-1,0));
document.getElementById('btn-right').addEventListener('click', ()=>setDir(1,0));
startBtn.addEventListener('click', initGame);

// Touch swipe support
let tx0, ty0;
canvas.addEventListener('touchstart', e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if (Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0);
  else setDir(0,dy>0?1:-1);
},{passive:true});
</script>
</body>
</html>
